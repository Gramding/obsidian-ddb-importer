name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

# A new release run cancels any earlier run still stuck in progress.
concurrency:
  group: release
  cancel-in-progress: true

jobs:
  release:
    # Run on tag pushes, manual dispatch, OR main commits whose message starts with "chore: release"
    if: "github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') || startsWith(github.event.head_commit.message, 'chore: release')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Verify build output
        run: |
          ls -lh main.js manifest.json
          echo "Version: $(node -p "require('./package.json').version")"

      - name: Create or update release
        run: |
          set -euo pipefail
          TAG="v$(node -p "require('./package.json').version")"
          echo "Target release tag: $TAG"
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists — uploading assets"
            gh release upload "$TAG" main.js manifest.json --clobber
          else
            echo "Creating release $TAG"
            gh release create "$TAG" main.js manifest.json \
              --title "$TAG" \
              --generate-notes
          fi
          echo "Done. Release URL:"
          gh release view "$TAG" --json url --jq .url
        env:
          GH_TOKEN: ${{ github.token }}
